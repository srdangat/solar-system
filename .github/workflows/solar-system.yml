name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - 'feature/*'
permissions:
  contents: read
  id-token: write

env:
    MONGO_URI: ${{ secrets.MONGO_URI }}
    MONGO_USERNAME:  ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD:  ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        strategy:
          matrix:
            nodejs_version: [18, 20]
            os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Setup NodeJS Version - ${{ matrix.nodejs_version }}
              uses: actions/setup-node@v6
              with:
                node-version: ${{ matrix.nodejs_version }}

            - name: Cache NPM Dependencies
              uses: actions/cache@v6
              with:
                path: node_modules
                key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}   

            - name: Install Dependencies
              run: npm install

            - name: Unit Testing
              id: nodejs-unit-test
              run: npm test

            - name: Archive Test Result
              if: always ()
              uses: actions/upload-artifact@v7
              with:
                name: Mocha-Test-Result
                path: test-results.xml

    code-coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Setup NodeJS Version - 18
              uses: actions/setup-node@v6
              with:
                node-version: 18

            - name: Cache NPM Dependencies
              uses: actions/cache@v6
              with:
                path: node_modules
                key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Check Code Coverage
              continue-on-error: true
              run: npm run coverage

            - name: Archive Test Result
              uses: actions/upload-artifact@v7
              with:
                name: Code-Coverage-Result
                path: coverage
                retention-days: 5

    docker:
        name: Containerization
        permissions:
          packages: write
        needs: [unit-testing, code-coverage]
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v7

          - name: Log in to Docker Hub
            uses: docker/login-action@v4
            with:
              username: ${{ vars.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v4
            with:
              registry: ghcr.io
              username: ${{ github.repository_owner }}
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Set up QEMU
            uses: docker/setup-qemu-action@v4
            
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

          - name: Docker Build For Testing
            uses: docker/build-push-action@v7
            with:
              context: .
              load: true
              push: false
              tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

          - name: Run Container and Test `/live` Endpoint
            run: |
              docker images
              docker run --name solar-system-app -d \
                   -p 3000:3000 \
                   -e MONGO_URI=$MONGO_URI \
                   -e MONGO_USERNAME=$MONGO_USERNAME \
                   -e MONGO_PASSWORD=$MONGO_PASSWORD \
                   ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

              echo "Verifying /live endpoint"
              wget -q -O - http://127.0.0.1:3000/live | grep live
              
          - name:  Docker Build and Push to Docker Hub & GHCR
            uses: docker/build-push-action@v7
            with:
              context: .
              push: true
              tags: |
                ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}

    dev-deploy:
        if: contains(github.ref, 'feature/')
        needs: docker
        uses: ./.github/workflows/reuse-deployment.yml
        with:
          environment: development
        secrets:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    dev-integration-testing:
        if: contains(github.ref, 'feature/')
        name: Dev Integration Testing
        needs: dev-deploy
        runs-on: ubuntu-latest
        steps:
            - name: Test Dev Endpoint
              env:
                URL: ${{ needs.dev-deploy.outputs.APP_URL }}
              run: |
                echo "Testing: https://$URL/live"
                for i in {1..60}; do
                  RESPONSE=$(curl -s https://$URL/live || true)
                  echo "$RESPONSE" | jq -r '.status' 2>/dev/null | grep -i live && exit 0
                  echo "Waiting for dev app..."
                  sleep 10
                done
                echo "Dev integration test failed"
                exit 1

    prod-deploy:
        if: github.ref == 'refs/heads/main'
        needs: docker
        uses: ./.github/workflows/reuse-deployment.yml
        with:
          environment: production
        secrets:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    prod-integration-testing:
        if: github.ref == 'refs/heads/main'
        name: Production Integration Testing
        needs: prod-deploy
        runs-on: ubuntu-latest
        steps:
            - name: Test Production Endpoint
              env:
                URL: ${{ needs.prod-deploy.outputs.APP_URL }}
              run: |
                echo "Testing: https://$URL/live"
                for i in {1..60}; do
                  HTTP_RESPONSE=$(curl -s https://$URL/live || true)
                  echo "$HTTP_RESPONSE" | jq -r '.status' 2>/dev/null | grep -i live && exit 0
                  echo "Waiting for production app..."
                  sleep 10
                done
                echo "Production integration test failed"
                exit 1