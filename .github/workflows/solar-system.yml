name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - 'feature/*'
permissions:
  contents: read
  id-token: write

env:
    MONGO_URI: ${{ secrets.MONGO_URI }}
    MONGO_USERNAME:  ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD:  ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        strategy:
          matrix:
            nodejs_version: [18, 20]
            os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Setup NodeJS Version - ${{ matrix.nodejs_version }}
              uses: actions/setup-node@v6
              with:
                node-version: ${{ matrix.nodejs_version }}

            - name: Cache NPM Dependencies
              uses: actions/cache@v6
              with:
                path: node_modules
                key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}   

            - name: Install Dependencies
              run: npm install

            - name: Unit Testing
              id: nodejs-unit-test
              run: npm test

            - name: Archive Test Result
              if: always ()
              uses: actions/upload-artifact@v7
              with:
                name: Mocha-Test-Result
                path: test-results.xml

    code-coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Setup NodeJS Version - 18
              uses: actions/setup-node@v6
              with:
                node-version: 18

            - name: Cache NPM Dependencies
              uses: actions/cache@v6
              with:
                path: node_modules
                key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Check Code Coverage
              continue-on-error: true
              run: npm run coverage

            - name: Archive Test Result
              uses: actions/upload-artifact@v7
              with:
                name: Code-Coverage-Result
                path: coverage
                retention-days: 5

    docker:
        name: Containerization
        permissions:
          packages: write
        needs: [unit-testing, code-coverage]
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v7

          - name: Log in to Docker Hub
            uses: docker/login-action@v4
            with:
              username: ${{ vars.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v4
            with:
              registry: ghcr.io
              username: ${{ github.repository_owner }}
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Set up QEMU
            uses: docker/setup-qemu-action@v4
            
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

          - name: Docker Build For Testing
            uses: docker/build-push-action@v7
            with:
              context: .
              load: true
              push: false
              tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

          - name: Run Container and Test `/live` Endpoint
            run: |
              docker images
              docker run --name solar-system-app -d \
                   -p 3000:3000 \
                   -e MONGO_URI=$MONGO_URI \
                   -e MONGO_USERNAME=$MONGO_USERNAME \
                   -e MONGO_PASSWORD=$MONGO_PASSWORD \
                   ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

              echo "Verifying /live endpoint"
              wget -q -O - http://127.0.0.1:3000/live | grep live
              
          - name:  Docker Build and Push to Docker Hub & GHCR
            uses: docker/build-push-action@v7
            with:
              context: .
              push: true
              tags: |
                ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}

    dev-deploy:
        if: contains(github.ref, 'feature/')
        needs: docker
        environment:
          name: development
          url: https://${{ steps.set-ingress-host.outputs.APP_INGRESS_URL }}
        outputs:
          APP_INGRESS_URL: ${{ steps.set-ingress-host.outputs.APP_INGRESS_URL }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Configure AWS (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ vars.AWS_REGION }}

            - name: Install Kubectl CLI
              uses: azure/setup-kubectl@v4
              with:
                version: v1.36.0

            - name: Configure kubeconfig
              run: |
                aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name solar-system


            - name: Verify Cluster Connection
              run: | 
                kubectl version 
                echo "------------------------------------------" 
                kubectl get nodes 
                echo "------------------------------------------"
                kubectl get namespaces

            - name: Set Ingress Host
              run: |
                echo "INGRESS_HOST=solar-system-${{ vars.NAMESPACE }}.cloud2devops.online" >> $GITHUB_ENV

            - name: Replace Tokens in Manifests
              uses: cschleiden/replace-tokens@v1
              with:
                tokenPrefix: '_{_'
                tokenSuffix: '_}_'
                files: '["k8s/development/*"]'
              env:
                NAMESPACE: ${{ vars.NAMESPACE }}
                REPLICAS: ${{ vars.REPLICAS }}
                IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                INGRESS_HOST: ${{ env.INGRESS_HOST }}
                ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}


            - name: Verify replaced manifests
              run: cat k8s/development/*.yml

            - name: Create MongoDB Secret
              run: |
                kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
                --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
                --from-literal=MONGO_USERNAME="${{ vars.MONGO_USERNAME }}" \
                --from-literal=MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
                --dry-run=client -o yaml | kubectl apply -f -

            - name: Deploy to Dev
              run: |
                kubectl apply -f k8s/development

            - name: Wait for ALB Hostname
              run: |
                for i in {1..30}; do
                  ALB_HOSTNAME=$(kubectl get ingress -n ${{ vars.NAMESPACE }} \
                    -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')

                  if [ -n "$ALB_HOSTNAME" ]; then
                    echo "ALB_HOSTNAME=$ALB_HOSTNAME" >> $GITHUB_ENV
                    echo "Found ALB: $ALB_HOSTNAME"
                    exit 0
                  fi

                  echo "Waiting for ALB..."
                  sleep 10
                done

                echo "ALB not created in time" && exit 1

            - name: Get ALB Hosted Zone ID
              run: |
                ALB_ARN=$(aws elbv2 describe-load-balancers \
                  --query "LoadBalancers[?DNSName=='$ALB_HOSTNAME'].LoadBalancerArn" \
                  --output text)

                ALB_ZONE_ID=$(aws elbv2 describe-load-balancers \
                  --load-balancer-arns "$ALB_ARN" \
                  --query "LoadBalancers[0].CanonicalHostedZoneId" \
                  --output text)

                echo "ALB_ZONE_ID=$ALB_ZONE_ID" >> $GITHUB_ENV

            - name: Create/Update Route53 Alias Record
              run: |
                cat > route53.json <<EOF
                {
                  "Comment": "UPSERT ALB Alias DEV",
                  "Changes": [{
                    "Action": "UPSERT",
                    "ResourceRecordSet": {
                      "Name": "${{ env.INGRESS_HOST }}",
                      "Type": "A",
                      "AliasTarget": {
                        "HostedZoneId": "${ALB_ZONE_ID}",
                        "DNSName": "${ALB_HOSTNAME}",
                        "EvaluateTargetHealth": false
                      }
                    }
                  }]
                }
                EOF

                aws route53 change-resource-record-sets \
                  --hosted-zone-id ${{ vars.ROUTE53_HOSTED_ZONE_ID }} \
                  --change-batch file://route53.json

            - name: Set App Ingress Host
              id: set-ingress-host
              run: |
                echo "APP_INGRESS_URL=${INGRESS_HOST}" >> $GITHUB_OUTPUT

    dev-integration-testing:
        if: contains(github.ref, 'feature/')
        name: Dev Integration Testing
        needs: dev-deploy
        runs-on: ubuntu-latest
        steps:
            - name: Test Dev Endpoint
              env:
                URL: ${{ needs.dev-deploy.outputs.APP_INGRESS_URL }}
              run: |
                echo "Testing: https://$URL/live"
                for i in {1..12}; do
                  RESPONSE=$(curl -s https://$URL/live || true)
                  echo "$RESPONSE" | jq -r '.status' 2>/dev/null | grep -i live && exit 0
                  echo "Waiting for dev app..."
                  sleep 10
                done
                echo "Dev integration test failed"
                exit 1